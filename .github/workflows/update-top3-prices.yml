name: Update daily stock TOP3 prices

on:
  # GitHub Actions cron uses UTC.
  # 21:10, 21:20, 21:30 UTC Monday-Friday
  # = 06:10, 06:20, 06:30 KST Tuesday-Saturday.
  # The first successful run writes the latest close; later retries exit
  # without a commit when there is no price change.
  schedule:
    - cron: "10,20,30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-daily-stock-top3-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update monthly TOP3 closing prices
        id: top3
        run: node .github/scripts/update_top3_prices.mjs

      - name: Update released economic calendar Actual values
        id: calendar
        continue-on-error: true
        run: python .github/scripts/update_indicators_calendar.py --calendar-only

      - name: Update FedWatch probabilities
        id: fedwatch
        continue-on-error: true
        run: python .github/scripts/update_indicators_calendar.py --fedwatch-only

      - name: Commit and push successful daily updates
        run: |
          if git diff --quiet -- data/stock-price-history.js data/indicators.js index.html; then
            echo "No TOP3 price, calendar, or FedWatch changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stock-price-history.js data/indicators.js index.html
          git commit -m "Update daily TOP3 prices and macro data"
          git push

      - name: Report blocked macro sources
        if: ${{ always() && (steps.calendar.outcome == 'failure' || steps.fedwatch.outcome == 'failure') }}
        run: |
          echo "::error title=Macro source update failed::Calendar outcome: ${{ steps.calendar.outcome }}; FedWatch outcome: ${{ steps.fedwatch.outcome }}"
          exit 1
