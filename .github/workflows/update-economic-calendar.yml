name: Update weekly economic calendar

on:
  # GitHub Actions cron uses UTC.
  # Try at 08:30, 09:30, and 10:30 KST on Monday. Later attempts exit
  # immediately when the current-week snapshot was already committed.
  schedule:
    - cron: "30 23 * * 0"
    - cron: "30 0 * * 1"
    - cron: "30 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weekly-macro-indicators
  cancel-in-progress: false

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Investing.com calendar and released Actual values
        id: calendar
        continue-on-error: true
        env:
          SKIP_IF_CURRENT_WEEK: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python .github/scripts/update_indicators_calendar.py --calendar-only

      - name: Commit and push if calendar changed
        if: ${{ always() }}
        run: |
          if git diff --quiet -- data/indicators.js index.html; then
            echo "No economic calendar changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.js index.html
          git commit -m "Update weekly economic calendar"
          git push

      - name: Report blocked calendar source
        if: ${{ always() && steps.calendar.outcome == 'failure' }}
        run: |
          echo "::error title=Calendar source update failed::Calendar outcome: ${{ steps.calendar.outcome }}"
          exit 1
