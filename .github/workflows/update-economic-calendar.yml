name: Update weekly macro indicators

on:
  # GitHub Actions cron uses UTC.
  # Try at 08:30, 09:30, and 10:30 KST on Monday. Later attempts exit
  # immediately when the current-week snapshot was already committed.
  schedule:
    - cron: "30 23 * * 0"
    - cron: "30 0 * * 1"
    - cron: "30 1 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: Run the full update or only test the FedWatch source
        required: true
        default: update
        type: choice
        options:
          - update
          - probe-fedwatch

permissions:
  contents: write

concurrency:
  group: update-weekly-macro-indicators
  cancel-in-progress: false

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Investing.com calendar and FedWatch
        env:
          SKIP_IF_CURRENT_WEEK: ${{ github.event_name == 'schedule' && '1' || '0' }}
          UPDATE_MODE: ${{ inputs.mode || 'update' }}
        run: |
          if [ "$UPDATE_MODE" = "probe-fedwatch" ]; then
            python .github/scripts/update_indicators_calendar.py --probe-fedwatch
          else
            python .github/scripts/update_indicators_calendar.py
          fi

      - name: Commit and push if macro indicators changed
        if: ${{ inputs.mode != 'probe-fedwatch' }}
        run: |
          if git diff --quiet -- data/indicators.js index.html; then
            echo "No macro indicator changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.js index.html
          git commit -m "Update weekly macro indicators"
          git push
