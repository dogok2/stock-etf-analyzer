name: Update weekly economic calendar

on:
  # GitHub Actions cron uses UTC.
  # 23:30 UTC Sunday = 08:30 KST Monday.
  schedule:
    - cron: "30 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Investing.com high-importance weekly events
        run: python .github/scripts/update_indicators_calendar.py

      - name: Commit and push if calendar changed
        run: |
          if git diff --quiet -- data/indicators.js; then
            echo "No calendar changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indicators.js
          git commit -m "Update weekly economic calendar"
          git push
